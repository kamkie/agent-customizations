name: Verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify repository and deployment tooling
        shell: pwsh
        run: ./scripts/test.ps1
